<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Electrical Checker PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { font-family:Tahoma; background:#eef3f7; }
.container { width:1200px; margin:auto; }
h1 { text-align:center; }

.grid {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:10px;
}

input, select {
  padding:8px;
  width:100%;
}

button {
  padding:10px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

table {
  width:100%;
  margin-top:20px;
  border-collapse: collapse;
}
th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}
.pass { color:green; }
.fail { color:red; }
.warn { color:orange; }
</style>
</head>

<body>

<div class="container">
<h1>⚡ Electrical Checker PRO</h1>

<input type="file" id="fileInput">

<table id="resultTable">
<thead>
<tr>
<th>Row</th>
<th>Result</th>
<th>Detail</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

// ================== FULL AMPACITY (ย่อบางส่วน แต่ขยายได้) ==================
const SIZES = [1,1.5,2.5,4,6,10,16,25,35,50,70,95];

const AMPACITY = {
  THW: {
    "กลุ่ม 1": {
      "แกนเดียว": {2:[10,13,17,23,30,40,53,70,86,104,131,158]}
    }
  },
  CV: {
    "กลุ่ม 1": {
      "แกนเดียว": {2:[13,17,24,32,41,56,74,96,119,144,182,219]}
    }
  },
  NYY: {
    "กลุ่ม 1": {
      "แกนเดียว": {2:[10,13,17,23,30,40,53,70,86,104,131,158]}
    }
  }
};

// ================== HELPERS ==================
function isTrue(v){
  return String(v).toUpperCase()=="TRUE";
}

function getAmp(type, size){
  try{
    let arr = AMPACITY[type]["กลุ่ม 1"]["แกนเดียว"][2];
    return arr[SIZES.indexOf(size)];
  }catch{
    return null;
  }
}

function getMaxMCB(meter){
  if(!meter) return null;
  if(meter.includes("15(45)")) return 50;
  if(meter.includes("30(100)")) return 100;
  if(meter.includes("50(150)")) return 125;
  return null;
}

// ================== CORE LOGIC ==================
function checkRow(row){

  let meter = row[5];
  let mcb = parseFloat(row[7]);
  let cable = parseFloat(row[8]);
  let type = row[9];
  let circuits = parseInt(row[12])||1;
  let ground = parseFloat(row[15]);
  let busbar = parseFloat(row[14]);
  let grounding = row[13];
  let rcd = row[21];

  let result="ผ่าน";
  let reasons=[];

  // MCB
  let max = getMaxMCB(meter);
  if(max && mcb>max){
    result="ไม่ผ่าน";
    reasons.push("MCB เกินมิเตอร์");
  }

  // Grounding
  if(!isTrue(grounding)){
    result="ไม่ผ่าน";
    reasons.push("ไม่มี Ground");
  }

  // Busbar
  if(busbar<mcb){
    result="ไม่ผ่าน";
    reasons.push("Busbar ไม่พอ");
  }

  // Ground wire
  let req = 16;
  if(cable<=35) req=10;
  if(ground<req){
    result="ไม่ผ่าน";
    reasons.push("สายกราวด์เล็กไป");
  }

  // Ampacity
  let amp = getAmp(type,cable);
  if(amp){
    let total = amp*circuits;
    if(total<mcb){
      result="ไม่ผ่าน";
      reasons.push("Ampacity ไม่พอ");
    }
  }else{
    result="ตรวจสอบไม่สมบูรณ์";
    reasons.push("ไม่มี ampacity");
  }

  // RCD
  if(!isTrue(rcd)){
    result="ไม่ผ่าน";
    reasons.push("ไม่มี RCD");
  }

  return {result, reasons};
}

// ================== IMPORT EXCEL ==================
document.getElementById("fileInput").addEventListener("change", function(e){

  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onload = function(e){
    let data = new Uint8Array(e.target.result);
    let workbook = XLSX.read(data, {type:'array'});
    let sheet = workbook.Sheets[workbook.SheetNames[0]];
    let json = XLSX.utils.sheet_to_json(sheet, {header:1});

    render(json);
  };

  reader.readAsArrayBuffer(file);
});

// ================== RENDER ==================
function render(data){

  let tbody = document.querySelector("#resultTable tbody");
  tbody.innerHTML="";

  for(let i=1;i<data.length;i++){

    let res = checkRow(data[i]);

    let color = "pass";
    if(res.result=="ไม่ผ่าน") color="fail";
    if(res.result=="ตรวจสอบไม่สมบูรณ์") color="warn";

    let tr = `
    <tr>
      <td>${i}</td>
      <td class="${color}">${res.result}</td>
      <td>${res.reasons.join("<br>")}</td>
    </tr>`;

    tbody.innerHTML += tr;
  }
}

</script>

</body>
</html>
